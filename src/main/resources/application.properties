spring.application.name=ProyectoCibertec

# ============================================================
# DATASOURCE - SQL Server Express
# CORRECCIÓN: Se reemplaza la URL de MySQL por SQL Server.
# Ajusta 'DESKTOP-H3U62CV\SQLEXPRESS' con tu nombre de servidor.
# ============================================================
spring.datasource.url=jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=bd_mercado;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Dialecto para SQL Server
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# ============================================================
# Servidor
# ============================================================
server.port=8080
